<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Research — Almir Lima Jr.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root, [data-theme="light"] {
      --bg:       #F8F9FA;
      --bg-card:  #FFFFFF;
      --text:     #1A1A2E;
      --accent:   #4361EE;
      --muted:    #6C757D;
      --border:   #DEE2E6;
      --tag-bg:   #FFFFFF;
      --shadow:   0 1px 4px rgba(0,0,0,0.06);
      --prose-bg: #FFFFFF;
    }
    [data-theme="dark"] {
      --bg:       #0F0F1A;
      --bg-card:  #16162A;
      --text:     #E8E9F0;
      --accent:   #5B7BFF;
      --muted:    #8B8FA8;
      --border:   #2A2A42;
      --tag-bg:   #1E1E34;
      --shadow:   0 1px 6px rgba(0,0,0,0.3);
      --prose-bg: #16162A;
    }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.7;
      padding: 0 1.5rem;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    
    /* ── Nav ── */
    .site-nav {
      max-width: 680px; margin: 0 auto; width: 100%;
      padding: 1.6rem 0 0;
      display: flex; gap: 1.4rem; align-items: center;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.6rem;
      text-decoration: none; margin-right: auto;
    }
    .nav-logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem; color: var(--text);
      letter-spacing: -0.01em; transition: color 0.2s;
    }
    .nav-logo:hover .nav-logo-name { color: var(--accent); }
    .nav-link {
      font-size: 0.8rem; font-weight: 500; color: var(--muted);
      text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s;
    }
    .nav-link:hover, .nav-link.active { color: var(--accent); }
    /* toggle always last item in nav */
    .theme-toggle {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.3rem 0.65rem;
      cursor: pointer; display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.74rem; font-family: 'Inter', sans-serif; font-weight: 500;
      color: var(--muted); transition: background 0.3s, border-color 0.3s, color 0.2s;
      box-shadow: var(--shadow);
    }
    .theme-toggle:hover { color: var(--text); }
    .theme-toggle .icon { font-size: 0.85rem; line-height: 1; }
    @media (max-width: 560px) {
      .site-nav { padding: 1rem 0 0; gap: 1rem; }
    }
    .page { max-width: 680px; margin: 0 auto; width: 100%; flex: 1; padding: 4rem 0 1rem; }
    .hero { margin-bottom: 2.6rem; }
    .hero-eyebrow {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.7rem;
      opacity: 0; animation: fadeUp 0.7s 0.1s ease forwards;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      line-height: 1.1; color: var(--text); margin-bottom: 0.8rem;
      opacity: 0; animation: fadeUp 0.7s 0.2s ease forwards;
    }
    .hero-bio {
      font-size: 0.95rem; color: var(--muted); line-height: 1.75;
      opacity: 0; animation: fadeUp 0.7s 0.3s ease forwards;
    }
    .blog-list { list-style: none; }
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 0.5rem; margin-top: 1rem;
    }
    .page-btn {
      font-size: 0.8rem; font-weight: 500;
      color: var(--muted); background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.35rem 0.7rem; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      min-width: 2rem; text-align: center;
    }
    .page-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
    .page-btn.active { color: var(--accent); border-color: var(--accent); font-weight: 600; }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .blog-card {
      padding: 1.2rem 1.5rem; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 0.75rem; box-shadow: var(--shadow);
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 1rem; flex-wrap: wrap;
      transition: background 0.3s, border-color 0.3s, transform 0.18s;
      text-decoration: none;
    }
    .blog-card:hover { transform: translateY(-2px); }
    .blog-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem; color: var(--text); line-height: 1.35; flex: 1;
    }
    .blog-date { font-size: 0.74rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    
    .footer {
      max-width: 680px; margin: 0 auto; width: 100%;
      padding: 1.4rem 0 2rem; border-top: 1px solid var(--border);
      display: flex; justify-content: center;
      align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    .footer-links { display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    .footer-links a {
      font-size: 0.78rem; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; opacity: 1 !important; }
    }
    @media (max-width: 520px) {
      .blog-card { flex-direction: column; gap: 0.2rem; }
    }
  </style>
</head>
<body>

  <nav class="site-nav" aria-label="Main navigation">
    <a class="nav-logo" href="/" aria-label="Home">
      <svg width="48" height="20" viewBox="0 0 48 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="0,15 6,10 10,13 15,5 20,8 24,2 29,5 33,1 38,4 42,0 48,2"
          stroke="var(--accent)" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
      <span class="nav-logo-name">Almir Lima Jr.</span>
    </a>
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/cv/">CV</a>
    <a class="nav-link" href="/research/">Research</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span class="icon" id="themeIcon">☽</span>
      <span id="themeLabel">Dark</span>
    </button>
  </nav>

  <div class="page">
    <header class="hero">
      <p class="hero-eyebrow">Research</p>
      <h1>Papers & Writings</h1>
    </header>
    <ul class="blog-list" id="blogList"></ul>
    <div class="pagination" id="pagination"></div>
  </div>

  <footer class="footer">
    <nav class="footer-links">
      <a href="mailto:almirlimajr97@icloud.com">Email</a>
      <a href="https://www.linkedin.com/in/almirlimajr97/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://github.com/almirlimajr97/" target="_blank" rel="noopener">GitHub</a>
      <a href="https://lattes.cnpq.br/8271261828366576/" target="_blank" rel="noopener">Lattes</a>
    </nav>
  </footer>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const saved = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      themeIcon.textContent  = t === 'dark' ? '☀︎' : '☽';
      themeLabel.textContent = t === 'dark' ? 'Light' : 'Dark';
      localStorage.setItem('theme', t);
    }
    applyTheme(saved);
    toggle.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>
  <script>
    const PAGE_SIZE = 4;
    let allPosts = [];
    let currentPage = 1;

    async function loadPosts() {
      const list = document.getElementById('blogList');
      try {
        const res = await fetch('/posts/posts.json?v=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const posts = await res.json();
        const monthOrder = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
        posts.sort((a, b) => {
          const parse = d => {
            const [m, y] = d.trim().split(' ');
            return parseInt(y) * 12 + (monthOrder[m.toLowerCase().slice(0,3)] ?? 0);
          };
          return parse(b.date) - parse(a.date);
        });
        allPosts = posts;
        renderPage(1);
      } catch(e) {
        list.innerHTML = '<li style="color:var(--muted);font-size:0.9rem;padding:1rem 0;">No posts found.</li>';
      }
    }

    function renderPage(page) {
      const list = document.getElementById('blogList');
      const pagination = document.getElementById('pagination');
      const totalPages = Math.max(1, Math.ceil(allPosts.length / PAGE_SIZE));
      currentPage = Math.min(Math.max(1, page), totalPages);

      const start = (currentPage - 1) * PAGE_SIZE;
      const pagePosts = allPosts.slice(start, start + PAGE_SIZE);

      if (pagePosts.length === 0) {
        list.innerHTML = '<li style="color:var(--muted);font-size:0.9rem;padding:1rem 0;">No posts found.</li>';
      } else {
        list.innerHTML = pagePosts.map(p => `
          <li>
            <a class="blog-card" href="/${p.file}">
              <span class="blog-title">${p.title}</span>
              <span class="blog-date">${p.date}</span>
            </a>
          </li>`).join('');
      }

      // Pagination controls
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = `<button class="page-btn" id="prevBtn" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      html += `<button class="page-btn" id="nextBtn" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
      pagination.innerHTML = html;

      pagination.querySelectorAll('[data-page]').forEach(btn => {
        btn.addEventListener('click', () => renderPage(parseInt(btn.dataset.page)));
      });
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      if (prevBtn) prevBtn.addEventListener('click', () => renderPage(currentPage - 1));
      if (nextBtn) nextBtn.addEventListener('click', () => renderPage(currentPage + 1));
    }

    loadPosts();
  </script>
</body>
</html>
