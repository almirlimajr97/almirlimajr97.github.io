name: New post

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Post title'
        required: true
      date:
        description: 'Post date (e.g. Jun 2026)'
        required: true
      content:
        description: |
          Post content in Markdown.
          Use ## for sections, ### for subsections.
          Separate paragraphs with a blank line.
        required: true
      acknowledgements:
        description: 'Acknowledgements (optional, supports Markdown links [text](url))'
        required: false
      pdf_filename:
        description: 'PDF filename in /files/ (optional, e.g. myfile.pdf)'
        required: false
      slug:
        description: 'File name without .html (e.g. my-new-post). Leave blank to auto-generate from title.'
        required: false

permissions:
  contents: write

jobs:
  create-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate post HTML
        env:
          TITLE: ${{ github.event.inputs.title }}
          DATE: ${{ github.event.inputs.date }}
          CONTENT: ${{ github.event.inputs.content }}
          ACKNOWLEDGEMENTS: ${{ github.event.inputs.acknowledgements }}
          PDF_FILENAME: ${{ github.event.inputs.pdf_filename }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          python3 - << 'PYEOF'
          import os, re

          title   = os.environ.get('TITLE', '')
          date    = os.environ.get('DATE', '')
          content = os.environ.get('CONTENT', '')
          ack     = os.environ.get('ACKNOWLEDGEMENTS', '').strip()
          pdf     = os.environ.get('PDF_FILENAME', '').strip()
          slug    = os.environ.get('SLUG', '').strip()

          # Auto-generate slug from title
          if not slug:
              slug = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')

          # Convert Markdown to HTML
          def md_to_html(text):
              # Links [text](url)
              text = re.sub(r'\[([^\]]+)\]\(([^)]+)\)', r'<a href="\2" target="_blank" rel="noopener">\1</a>', text)
              # Bold **text**
              text = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', text)
              # Italic *text*
              text = re.sub(r'\*(.+?)\*', r'<em>\1</em>', text)
              return text

          def md_to_body(text):
              lines = text.split('\n')
              html = []
              paragraph = []

              def flush_paragraph():
                  if paragraph:
                      html.append('<p>' + md_to_html(' '.join(paragraph)) + '</p>')
                      paragraph.clear()

              for line in lines:
                  line = line.rstrip()
                  if line.startswith('## '):
                      flush_paragraph()
                      html.append(f'<h2>{md_to_html(line[3:])}</h2>')
                  elif line.startswith('### '):
                      flush_paragraph()
                      html.append(f'<h3>{md_to_html(line[4:])}</h3>')
                  elif line == '':
                      flush_paragraph()
                  else:
                      paragraph.append(line)
              flush_paragraph()
              return '\n      '.join(html)

          body_html = md_to_body(content)
          ack_html  = md_to_html(ack) if ack else ''

          pdf_block = ''
          if pdf:
              pdf_block = f'''
      <div class="pdf-wrap">
        <iframe src="/files/{pdf}" title="{title}"></iframe>
      </div>
      <a class="download-link" href="/files/{pdf}" target="_blank" rel="noopener">
        📥 Download the paper (PDF)
      </a>'''

          ack_block = ''
          if ack_html:
              ack_block = f'''
    <div class="ack-box">
      {ack_html}
    </div>'''

          html = f'''<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/files/favicon.svg">
  <title>Almir Lima Jr.</title>
  <meta name="post-title" content="{title}">
  <meta name="post-date"  content="{date}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}
    :root, [data-theme="light"] {{
      --bg: #F8F9FA; --bg-card: #FFFFFF; --text: #1A1A2E;
      --accent: #4361EE; --muted: #6C757D; --border: #DEE2E6;
      --shadow: 0 1px 4px rgba(0,0,0,0.06); --prose-bg: #FFFFFF;
    }}
    [data-theme="dark"] {{
      --bg: #0F0F1A; --bg-card: #16162A; --text: #E8E9F0;
      --accent: #5B7BFF; --muted: #8B8FA8; --border: #2A2A42;
      --shadow: 0 1px 6px rgba(0,0,0,0.3); --prose-bg: #16162A;
    }}
    html {{ font-size: 16px; scroll-behavior: smooth; }}
    body {{
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.7;
      padding: 0 1.5rem; transition: background 0.3s, color 0.3s;
      min-height: 100vh; display: flex; flex-direction: column;
    }}
    .site-nav {{
      max-width: 680px; margin: 0 auto; width: 100%;
      padding: 1.6rem 0 0; display: flex; gap: 1.4rem; align-items: center;
    }}
    .nav-logo {{ display: flex; align-items: center; gap: 0.6rem; text-decoration: none; margin-right: auto; }}
    .nav-logo-name {{ font-family: 'DM Serif Display', serif; font-size: 0.95rem; color: var(--text); letter-spacing: -0.01em; transition: color 0.2s; }}
    .nav-logo:hover .nav-logo-name {{ color: var(--accent); }}
    .nav-link {{ font-size: 0.8rem; font-weight: 500; color: var(--muted); text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s; }}
    .nav-link:hover, .nav-link.active {{ color: var(--accent); }}
    .theme-toggle {{
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
      padding: 0.3rem 0.65rem; cursor: pointer; display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.74rem; font-family: 'Inter', sans-serif; font-weight: 500;
      color: var(--muted); transition: background 0.3s, border-color 0.3s, color 0.2s;
      box-shadow: var(--shadow);
    }}
    .theme-toggle:hover {{ color: var(--text); }}
    .theme-toggle .icon {{ font-size: 0.85rem; line-height: 1; }}
    @media (max-width: 560px) {{
      .theme-toggle {{ position: static; box-shadow: none; margin-left: auto; }}
      .site-nav {{ padding: 1rem 0 0; gap: 1rem; }}
    }}
    .page {{ max-width: 680px; margin: 0 auto; width: 100%; flex: none; padding: 3rem 0 2.4rem; }}
    .back-link {{ display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; font-weight: 500; color: var(--muted); text-decoration: none; margin-bottom: 2.4rem; transition: color 0.2s; }}
    .back-link:hover {{ color: var(--accent); }}
    .post-title {{ font-family: 'DM Serif Display', serif; font-size: clamp(1.6rem, 4vw, 2.3rem); line-height: 1.2; color: var(--text); margin-bottom: 0.5rem; opacity: 0; animation: fadeUp 0.7s 0.1s ease forwards; }}
    .post-date {{ font-size: 0.8rem; color: var(--muted); margin-bottom: 1.8rem; opacity: 0; animation: fadeUp 0.7s 0.2s ease forwards; }}
    .divider {{ border: none; border-top: 1px solid var(--border); margin: 1.8rem 0; }}
    .ack-box {{ background: var(--prose-bg); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 4px; padding: 1rem 1.2rem; margin-bottom: 1.8rem; font-size: 0.84rem; color: var(--muted); line-height: 1.7; transition: background 0.3s, border-color 0.3s; }}
    .ack-box a {{ color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }}
    .post-body {{ font-size: 1rem; line-height: 1.85; color: var(--text); }}
    .post-body h2 {{ font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); margin: 2rem 0 0.8rem; }}
    .post-body h3 {{ font-size: 1rem; font-weight: 600; color: var(--text); margin: 1.6rem 0 0.5rem; }}
    .post-body p {{ margin-bottom: 1.2rem; }}
    .post-body a {{ color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }}
    .post-body strong {{ font-weight: 600; }}
    .post-body em {{ font-style: italic; }}
    .pdf-wrap {{ margin: 1.8rem 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; box-shadow: var(--shadow); }}
    .pdf-wrap iframe {{ display: block; width: 100%; height: 600px; border: none; }}
    .download-link {{ display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.88rem; font-weight: 500; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); border-radius: 4px; padding: 0.5rem 1rem; transition: background 0.2s, color 0.2s; }}
    .download-link:hover {{ background: var(--accent); color: #fff; }}
    .footer {{ max-width: 680px; margin: 0 auto; width: 100%; padding: 1.4rem 0 2rem; border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 1rem; }}
    .footer-links {{ display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center; justify-content: center; }}
    .footer-links a {{ font-size: 0.78rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: color 0.2s; }}
    .footer-links a:hover {{ color: var(--accent); }}
    @keyframes fadeUp {{ from {{ opacity: 0; transform: translateY(12px); }} to {{ opacity: 1; transform: translateY(0); }} }}
    @media (prefers-reduced-motion: reduce) {{ * {{ transition: none !important; animation: none !important; opacity: 1 !important; }} }}
    @media (max-width: 520px) {{ .pdf-wrap iframe {{ height: 400px; }} }}
  </style>
</head>
<body>

  <nav class="site-nav" aria-label="Main navigation">
    <a class="nav-logo" href="/" aria-label="Home">
      <svg width="48" height="20" viewBox="0 0 48 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="0,15 6,10 10,13 15,5 20,8 24,2 29,5 33,1 38,4 42,0 48,2"
          stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
      <span class="nav-logo-name">Almir Lima Jr.</span>
    </a>
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/cv/">CV</a>
    <a class="nav-link active" href="/research/">Research</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span class="icon" id="themeIcon">☽</span>
      <span id="themeLabel">Dark</span>
    </button>
  </nav>

  <div class="page">
    <a class="back-link" href="/research/">← Back to Research</a>
    <header>
      <h1 class="post-title">{title}</h1>
      <p class="post-date">{date}</p>
    </header>
    {ack_block}
    <hr class="divider" />
    <article class="post-body">
      {body_html}
      {pdf_block}
    </article>
  </div>

  <footer class="footer">
    <nav class="footer-links">
      <a href="mailto:almirlimajr97@icloud.com">Email</a>
      <a href="https://www.linkedin.com/in/almirlimajr97/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://github.com/almirlimajr97/" target="_blank" rel="noopener">GitHub</a>
      <a href="https://lattes.cnpq.br/8271261828366576/" target="_blank" rel="noopener">Lattes</a>
    </nav>
  </footer>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const saved = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    function applyTheme(t) {{
      html.setAttribute('data-theme', t);
      themeIcon.textContent  = t === 'dark' ? '☀︎' : '☽';
      themeLabel.textContent = t === 'dark' ? 'Light' : 'Dark';
      localStorage.setItem('theme', t);
    }}
    const postTitleMeta = document.querySelector('meta[name="post-title"]');
    if (postTitleMeta) {{ document.title = postTitleMeta.content + ' — Almir Lima Jr.'; }}
    applyTheme(saved);
    toggle.addEventListener('click', () => {{
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }});
  </script>

</body>
</html>'''

          filepath = f'posts/{slug}.html'
          with open(filepath, 'w', encoding='utf-8') as f:
              f.write(html)
          print(f'Created: {filepath}')
          PYEOF

      - name: Commit new post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --cached --quiet || git commit -m "New post: ${{ github.event.inputs.title }}"
          git push
