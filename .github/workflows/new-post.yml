name: New post

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Post title'
        required: true
      date:
        description: 'Post date (e.g. Jun 2026)'
        required: true
      content:
        description: 'Post content in Markdown (## for sections, **bold**, [text](url))'
        required: true
      acknowledgements:
        description: 'Acknowledgements (optional, supports Markdown links)'
        required: false
        default: ''
      pdf_filename:
        description: 'PDF filename in /files/ (optional, e.g. myfile.pdf)'
        required: false
        default: ''
      slug:
        description: 'File name without .html (optional, auto-generated from title if blank)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  create-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate post
        env:
          POST_TITLE: ${{ github.event.inputs.title }}
          POST_DATE: ${{ github.event.inputs.date }}
          POST_CONTENT: ${{ github.event.inputs.content }}
          POST_ACK: ${{ github.event.inputs.acknowledgements }}
          POST_PDF: ${{ github.event.inputs.pdf_filename }}
          POST_SLUG: ${{ github.event.inputs.slug }}
        run: python3 .github/scripts/generate_post.py

      - name: Update posts.json and sitemap.xml
        run: python3 .github/scripts/update_posts.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ sitemap.xml
          git diff --cached --quiet || git commit -m "New post: ${{ github.event.inputs.title }}"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
